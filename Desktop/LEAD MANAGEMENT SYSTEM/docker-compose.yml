version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: lead-distribution-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=lead-distribution

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: lead-distribution-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/lead-distribution
      - PORT=5000
      - JWT_SECRET=production-secret-key-change-me
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lead-distribution-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
